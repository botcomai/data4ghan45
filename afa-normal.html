<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Normal AFA Setup</title>
  
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/afa.css">
  <!-- Use transactions.css for the history table styling -->
  <link rel="stylesheet" href="css/transactions.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabase.js"></script>
</head>

<body>
  <div class="top-nav-controls">
    <button class="menu-btn" onclick="openMenu()">☰</button>
    <button class="back-btn" onclick="window.location.href='afa.html'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      <span class="back-text">Back</span>
    </button>
  </div>

  <div id="menu-container"></div>
  <div id="overlay" onclick="closeMenu()"></div>

  <div class="container" style="max-width: 800px;">
    <div class="afa-logo-container">
      <div class="afa-card-icon" style="margin: 0 auto 20px; font-size:48px; width:80px; height:80px; background:linear-gradient(135deg, #2a7de1 0%, #1e3c72 100%); color:white; box-shadow: 0 10px 25px rgba(42, 125, 225, 0.3);">📄</div>
    </div>

    <h2 style="text-align:center;">Normal AFA</h2>
    <p class="subtitle" style="text-align:center;">Standard setup requiring ID picture uploads. <span style="display:inline-block; margin-left:6px; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; background:rgba(42,125,225,0.1); color:#2a7de1;">Wallet: <span id="afaWalletDisplay">₵0.00</span></span></p>

    <div class="form-card" style="background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:30px; margin-bottom: 40px; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);">
        <h3 style="text-align:center; margin-top:0; color:#1e293b; font-size:18px; border-bottom:1px solid #e2e8f0; padding-bottom:15px; margin-bottom:20px;">Registration Details (<span class="normal-price-label">₵25.00</span>)</h3>
        <style>
          .afa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
          @media (max-width: 768px) { .afa-grid { grid-template-columns: 1fr; gap: 15px; } }
        </style>
        <form id="normalAfaForm">
            <div class="afa-grid">
                <div>
                    <label>Full Name *</label>
                    <input type="text" id="nName" required>
                </div>
                <div>
                    <label>Phone Number *</label>
                    <input type="text" id="nPhone" required>
                </div>
                <div>
                    <label>ID Type *</label>
                    <select id="nIdType" required>
                        <option value="">Select ID Type</option>
                        <option>Ghana Card</option>
                        <option>Passport</option>
                        <option>Driver License</option>
                        <option>Voter ID</option>
                    </select>
                </div>
                <div>
                    <label>ID Number *</label>
                    <input type="text" id="nIdNumber" required>
                </div>
                <div>
                    <label>Date of Birth *</label>
                    <input type="date" id="nDob" required style="width: 100%; padding: 14px; border: 1px solid #ced4da; border-radius: 10px; font-size: 15px; box-sizing: border-box; background: #f8f9fa; color: #333;">
                </div>
            </div>

            <div class="afa-grid" style="margin-top: 10px;">
                <div>
                    <label>ID Front *</label>
                    <input type="file" id="nIdFront" accept="image/*,application/pdf" required style="padding: 10px; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:10px; width:100%;">
                </div>
                <div>
                    <label>ID Back *</label>
                    <input type="file" id="nIdBack" accept="image/*,application/pdf" required style="padding: 10px; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:10px; width:100%;">
                </div>
            </div>
            
            <div style="margin-top:20px;">
                <button type="submit" class="pay-btn" style="width:100%; padding:16px; font-size:16px; background:linear-gradient(135deg, #2a7de1 0%, #1e3c72 100%);">Upload & Register</button>
            </div>
        </form>
    </div>

    <div class="history-card" style="background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:30px; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);">
        <h3 style="text-align:center; margin-top:0; color:#1e293b; font-size:18px; border-bottom:1px solid #e2e8f0; padding-bottom:15px; margin-bottom:0;">Normal Registration History</h3>
        <div class="table-container" style="margin-top: 0; border: none; padding: 0;">
            <table id="normalHistoryTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>ID Info</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" style="text-align:center; padding:30px; color:#94a3b8;">Loading history...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

  </div>

  <script src="js/menu.js"></script>
  <script src="js/afa-normal.js"></script>

</body>
</html>
